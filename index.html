<!DOCTYPE html>
<html lang="zh-Hans-CN">
  <head>
    <meta charset="UTF-8" />
    <title>郑进怀's Document</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
  </head>
  <body>
    <nav>
      <a href="#/">Home</a>
      <a href="https://github.com/zhengjinhuai" target="_blank">Github</a>
    </nav>
    <div id="app">加载中</div>

    <script>
      window.$docsify = {
        repo: '',
        name: '',

        // 搜索插件配置
        search: {
          maxAge: 86400000,
          // paths: [], // or 'auto'
          placeholder: '搜索',
          noData: '找不到结果!',
          depth: 6,
        },

        // 侧边栏配置
        loadSidebar: true,
        subMaxLevel: 3,

        // 顶部导航栏配置
        loadNavbar: true,
        // 封面配置
        // onlyCover: false,
        // coverpage: true,
        // 字数配置
        // ga: 'UA-XXXXX-Y',

        // 插件配置
        plugins: [
          function (hook) {
            var footer = [
              '<hr/>',
              '<footer>',
              '<span><a href="https://github.com/zhengjinhuai" target="_blank">郑进怀</a> &copy;2021</span>',
              '</footer>',
            ].join('')

            hook.afterEach(function (html) {
              return html + footer
            })
          },
        ],
      }
    </script>
    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
